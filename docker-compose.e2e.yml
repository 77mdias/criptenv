services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: criptenv-postgres-e2e
    restart: unless-stopped
    environment:
      POSTGRES_DB: criptenv_test
      POSTGRES_USER: criptenv_test
      POSTGRES_PASSWORD: criptenv_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U criptenv_test -d criptenv_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-e2e-data:/var/lib/postgresql/data

volumes:
  postgres-e2e-data:
