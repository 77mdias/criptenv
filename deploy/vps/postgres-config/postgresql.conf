# ===========================================
# PostgreSQL 15 — Otimizado para VPS com 8GB RAM
# CriptEnv Production Database
# ===========================================

# -------------------------------------------
# FILE LOCATIONS
# -------------------------------------------
data_directory = '/var/lib/postgresql/data/pgdata'
hba_file = '/var/lib/postgresql/data/pgdata/pg_hba.conf'
ident_file = '/var/lib/postgresql/data/pgdata/pg_ident.conf'

# -------------------------------------------
# CONNECTIONS & AUTH
# -------------------------------------------
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# -------------------------------------------
# MEMORY SETTINGS (Otimizado para ~8GB RAM)
# -------------------------------------------
shared_buffers = 2GB                    # 25% da RAM total
effective_cache_size = 6GB              # 75% da RAM (cache do SO + PG)
work_mem = 16MB                         # Memória por operação de sort/join
maintenance_work_mem = 512MB            # Para VACUUM, REINDEX, CREATE INDEX
huge_pages = try                        # Usar huge pages se disponível
temp_buffers = 8MB

# -------------------------------------------
# WAL / WRITE-AHEAD LOG
# -------------------------------------------
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
random_page_cost = 1.1                  # SSD/NVMe — mais baixo = favorece índices
effective_io_concurrency = 200          # SSD/NVMe suporta mais I/O paralelo

# -------------------------------------------
# QUERY PLANNER
# -------------------------------------------
default_statistics_target = 100
constraint_exclusion = partition
cursor_tuple_fraction = 0.1
from_collapse_limit = 8
join_collapse_limit = 8

# -------------------------------------------
# LOGGING (Produção — moderado)
# -------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000       # Loga queries lentas (>1s)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                      # Loga todos os arquivos temporários
log_autovacuum_min_duration = 0
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# -------------------------------------------
# AUTOVACUUM (Manter performance)
# -------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05

# -------------------------------------------
# LOCALE & FORMATTING
# -------------------------------------------
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# -------------------------------------------
# TIMEZONE
# -------------------------------------------
timezone = 'UTC'

# -------------------------------------------
# SSL (Desabilitado — use reverse proxy/Tunnel se necessário)
# Ou habilite se tiver certificados válidos
# -------------------------------------------
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'
