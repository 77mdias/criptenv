# ===========================================
# CriptEnv - VPS Docker Compose (Production)
# ===========================================
# Deploys the backend using pre-built images from Docker Hub.
# Watchtower auto-polls for new images every 5 minutes.
#
# Prerequisites:
#   1. Set secrets in .env (see .env.example)
#   2. docker login (if private registry)
#   3. docker compose up -d
# ===========================================

services:
  # -------------------------------------------
  # API - FastAPI (from Docker Hub)
  # -------------------------------------------
  api:
    image: ${DOCKER_REGISTRY:-77mdias}/criptenv-api:${CRIPTENV_VERSION:-latest}
    restart: always
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "false"
      RATE_LIMIT_STORAGE: redis
      REDIS_URL: redis://redis:6379/0
    command:
      - gunicorn
      - main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - "0.0.0.0:8000"
      - --workers
      - "${WEB_CONCURRENCY:-3}"
      - --timeout
      - "60"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_LOCAL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - criptenv

  # -------------------------------------------
  # Scheduler - Background Jobs
  # -------------------------------------------
  scheduler:
    image: ${DOCKER_REGISTRY:-77mdias}/criptenv-api:${CRIPTENV_VERSION:-latest}
    restart: always
    env_file:
      - .env
    environment:
      SCHEDULER_ENABLED: "true"
      RATE_LIMIT_STORAGE: redis
      REDIS_URL: redis://redis:6379/0
    command:
      - gunicorn
      - main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - "0.0.0.0:8000"
      - --workers
      - "1"
      - --timeout
      - "60"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - criptenv

  # -------------------------------------------
  # Redis - Session & Rate Limit Cache
  # -------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - criptenv

  # -------------------------------------------
  # Watchtower - Auto-update containers
  # -------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    restart: always
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_ROLLING_RESTART: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - criptenv

  # -------------------------------------------
  # Cloudflare Tunnel
  # -------------------------------------------
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: vps-cloudflare-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - criptenv

networks:
  criptenv:
