# Legacy rollback reference only. Current production API target is the VPS Docker
# stack in deploy/vps with Cloudflare Tunnel and Redis rate limits.
[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.envs]
PYTHON_VERSION = "3.11"
DEBUG = "false"
CORS_ORIGINS = "https://criptenv.77mdevseven.tech"
SCHEDULER_ENABLED = "true"
SCHEDULER_INTERVAL_HOURS = "24"
FRONTEND_URL = "https://criptenv.77mdevseven.tech"
