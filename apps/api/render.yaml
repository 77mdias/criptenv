services:
  - type: web
    name: criptenv-api
    runtime: python
    plan: starter
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: criptenv-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://criptenv.com,https://www.criptenv.com"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_INTERVAL_HOURS
        value: "24"
      - key: FRONTEND_URL
        value: "https://criptenv.com"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: criptenv-db
    plan: starter
    region: ohio
    postgresMajorVersion: 15
