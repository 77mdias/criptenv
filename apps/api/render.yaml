# Legacy rollback reference only. Current production API target is the VPS Docker
# stack in deploy/vps with Cloudflare Tunnel and Redis rate limits.
services:
  - type: web
    name: criptenv-api
    runtime: python
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://criptenv.77mdevseven.tech"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_INTERVAL_HOURS
        value: "24"
      - key: FRONTEND_URL
        value: "https://criptenv.77mdevseven.tech"
      # Set DATABASE_URL to your Supabase connection string
      # Format: postgresql://postgres.[project]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true
