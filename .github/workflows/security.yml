name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript
      - uses: github/codeql-action/analyze@v4

  dependencies:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit API Python dependencies
        run: pip-audit -r apps/api/requirements.txt
      - name: Audit CLI Python dependencies
        working-directory: apps/cli
        run: |
          python -m pip install -e .
          pip-audit
      - name: Audit web npm dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high
      - name: Audit GitHub Action npm dependencies
        working-directory: packages/github-action
        run: npm audit --audit-level=high

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
