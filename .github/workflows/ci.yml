name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run API tests
        run: make api-test

  cli:
    name: CLI tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run CLI tests
        run: make cli-test

  web:
    name: Web lint, tests, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Run web lint
        run: make web-lint
      - name: Run web unit tests
        run: make web-test-unit
      - name: Run Vinext compatibility check
        run: make web-check-vinext
      - name: Build web
        run: make web-build

  github-action:
    name: GitHub Action package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/github-action/package-lock.json
      - name: Install action dependencies
        working-directory: packages/github-action
        run: npm ci
      - name: Lint action
        working-directory: packages/github-action
        run: npm run lint
      - name: Test action
        working-directory: packages/github-action
        run: npm test
      - name: Typecheck action
        working-directory: packages/github-action
        run: npx tsc --noEmit
      - name: Build action bundle
        working-directory: packages/github-action
        run: npm run build
      - name: Verify action bundle is committed
        run: git diff --exit-code -- packages/github-action/dist
